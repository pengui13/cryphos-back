services:
  db:
    image: postgres:16-alpine
    container_name: cryphos-db
    restart: always
    environment:
      POSTGRES_DB: cryphos
      POSTGRES_USER: cryphos_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - cryphos_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cryphos_user -d cryphos" ]
      interval: 5s
      timeout: 3s
      retries: 20

  flower:
    image: cryphos-app:latest
    container_name: cryphos-flower
    restart: always
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      celery:
        condition: service_started
    working_dir: /app/apis
    environment:
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:5555:5555"
    command: >
      celery -A apis -b redis://redis:6379/0 flower --address=0.0.0.0 --port=5555 --basic_auth=${FLOWER_BASIC_AUTH}
  redis:
    image: redis:7-alpine
    container_name: cryphos-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: .
    image: cryphos-app:latest
    container_name: cryphos-backend
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    working_dir: /app/apis
    environment:
      PYTHONPATH: /app
    volumes:
      - ./staticfiles:/app/staticfiles
      - .:/app
      - venv_data:/app/.venv
    command: >
      sh -c "python manage.py migrate &&
             exec daphne -b 0.0.0.0 -p 8000 apis.asgi:application"

  liquidations:
    image: cryphos-app:latest
    depends_on:
      - backend
    container_name: cryphos-liquidations
    restart: always
    env_file: .env
    working_dir: /app/apis
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/1
    command: python liquidations.py

  collector:
    image: cryphos-app:latest
    depends_on:
      - backend
    container_name: cryphos-collector
    restart: always
    env_file: .env
    working_dir: /app/apis
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/1
    command: python collector.py

  klines_socket:
    image: cryphos-app:latest
    depends_on:
      - backend
    container_name: cryphos-klines
    restart: always
    env_file: .env
    working_dir: /app/apis
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/1
    command: python klines_socket.py

  celery:
    image: cryphos-app:latest
    depends_on:
      - backend
      - db
      - redis
    container_name: cryphos-celery
    restart: always
    env_file: .env
    working_dir: /app/apis
    environment:
      PYTHONPATH: /app
    command: celery -A apis worker -l info --concurrency=2

  celery-beat:
    image: cryphos-app:latest
    depends_on:
      - backend
      - db
      - redis
    container_name: cryphos-celery-beat
    restart: always
    env_file: .env
    working_dir: /app/apis
    environment:
      PYTHONPATH: /app
    volumes:
      - celerybeat_data:/data
    command: celery -A apis beat -l info --schedule=/data/celerybeat-schedule
  tg:
    image: cryphos-app:latest
    depends_on:
      - backend
      - db
    container_name: cryphos-tg
    restart: always
    env_file: .env
    working_dir: /app/apis
    environment:
      PYTHONPATH: /app
    command: python manage.py tg
    stop_grace_period: 20s

volumes:
  cryphos_pgdata:
  celerybeat_data:
  venv_data:
