[tool.ruff]
line-length=100
target-version="py313"

[tool.ruff.lint]
select = [
    "E",
    "W",   
    "F",
    "I",
    "N",   
    "UP",
    "B",
]
ignore = [
    "E203",
    "E266", 
    "E501",  
]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["E501"]
"__init__.py" = ["F401"] 

[tool.ruff.lint.isort]
known-first-party = ["apis", "config"]

[tool.ty.environment]
extra-paths = ["apis"]
python-platform = "linux"

[tool.ty.rules]
unresolved-attribute = "ignore"

[dependency-groups]
dev = [
    "django-stubs>=5.2.9",
    "pytest>=9.0.2",
    "pytest-django>=4.12.0",
    "ruff>=0.15.1",
    "ty>=0.0.17",
    "types-redis>=4.6.0.20241004",
]
